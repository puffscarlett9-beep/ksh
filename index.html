<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>骰子令交互版</title>
  <style>
    :root {
      --ink: #4a4037;
      --muted: #7b7168;
      --panel: rgba(255, 255, 255, 0.74);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(185, 179, 167, 0.58);
      --accent: #d88996;
      --shadow: 0 18px 50px rgba(74, 64, 55, 0.13);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: "SimHei", "黑体", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 48% 42%, rgba(255, 243, 199, 0.74) 0, rgba(255, 243, 199, 0.18) 18rem, transparent 34rem),
        radial-gradient(circle at top left, #fffdf7 0, #f6faff 48%, #f8f1ff 100%);
    }

    button,
    input,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid rgba(74, 64, 55, 0.12);
      background: var(--panel-strong);
      border-radius: 8px;
      min-height: 34px;
      padding: 0 12px;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(74, 64, 55, 0.06);
    }

    button:hover,
    button:focus-visible {
      border-color: rgba(216, 137, 150, 0.55);
      outline: none;
    }

    input,
    select {
      min-height: 34px;
      border: 1px solid rgba(74, 64, 55, 0.12);
      border-radius: 8px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.86);
      min-width: 0;
    }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 380px);
      grid-template-rows: auto minmax(0, 1fr);
    }

    .topbar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 18px 12px;
      border-bottom: 1px solid rgba(185, 179, 167, 0.32);
      background: rgba(255, 255, 255, 0.52);
      backdrop-filter: blur(14px);
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 2.2vw, 30px);
      line-height: 1.15;
      font-weight: 720;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(150px, 220px) auto auto auto auto;
      gap: 8px;
      align-items: center;
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .graph-meta {
      position: absolute;
      left: 18px;
      bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      pointer-events: none;
      z-index: 2;
    }

    .pill {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(74, 64, 55, 0.10);
      box-shadow: 0 4px 18px rgba(74, 64, 55, 0.08);
      font-size: 12px;
      color: var(--muted);
    }

    #graph {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    #graph.dragging {
      cursor: grabbing;
    }

    .link {
      fill: none;
      stroke: #b9b3a7;
      stroke-width: 1.2;
      stroke-opacity: 0.72;
      transition: stroke-width 160ms ease, stroke-opacity 160ms ease;
    }

    .link.dimmed {
      stroke-opacity: 0.12;
    }

    .link.highlighted {
      stroke-width: 2.4;
      stroke-opacity: 0.95;
      stroke: #d88996;
    }

    .node-group {
      cursor: pointer;
      transition: opacity 160ms ease;
    }

    .node-group.dimmed {
      opacity: 0.18;
    }

    .node-group.hidden-label text {
      display: none;
    }

    .node {
      stroke: #fff;
      stroke-width: 1.5;
      filter: drop-shadow(0 7px 10px rgba(74, 64, 55, 0.16));
      transition: r 160ms ease, stroke-width 160ms ease, opacity 160ms ease;
    }

    .node-group:hover .node,
    .node-group.selected .node,
    .node-group.related .node {
      stroke: #d88996;
      stroke-width: 2.4;
    }

    .node-group.selected .node {
      filter: drop-shadow(0 0 16px rgba(216, 137, 150, 0.48));
    }

    .node-label {
      fill: #4a4037;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.86);
      stroke-width: 4px;
      stroke-linejoin: round;
      font-weight: 620;
      pointer-events: none;
    }

    .node-label.level-L4 {
      font-weight: 520;
      fill: #62574e;
    }

    .side {
      min-height: 0;
      overflow: auto;
      border-left: 1px solid rgba(185, 179, 167, 0.36);
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(16px);
      padding: 16px;
    }

    .section {
      padding: 14px 0;
      border-bottom: 1px solid rgba(185, 179, 167, 0.26);
    }

    .section:first-child {
      padding-top: 0;
    }

    .section:last-child {
      border-bottom: 0;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 760;
      line-height: 1.3;
    }

    .detail-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 760;
    }

    .detail-type {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .kv {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.55;
    }

    .kv b {
      color: var(--muted);
      font-weight: 620;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      min-height: auto;
      box-shadow: none;
      border-radius: 999px;
      padding: 4px 9px;
      background: rgba(247, 233, 166, 0.72);
      border: 1px solid rgba(74, 64, 55, 0.09);
      font-size: 12px;
      line-height: 1.2;
    }

    .filters {
      display: grid;
      gap: 8px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }

    .bar-list {
      display: grid;
      gap: 7px;
      max-height: 260px;
      overflow: auto;
      padding-right: 2px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(86px, 1fr) minmax(80px, 1.4fr) 26px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      line-height: 1.3;
    }

    .bar-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #62574e;
    }

    .bar-track {
      height: 9px;
      border-radius: 999px;
      background: rgba(185, 179, 167, 0.18);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #f7c9d4, #bfe3d0);
    }

    .heat-list {
      display: grid;
      gap: 7px;
      max-height: 220px;
      overflow: auto;
    }

    .heat-row {
      display: grid;
      grid-template-columns: minmax(80px, 1fr) repeat(3, 30px) 42px;
      gap: 6px;
      align-items: center;
      font-size: 12px;
    }

    .heat-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .heat-cell {
      min-height: 22px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: #4a4037;
      border: 1px solid rgba(74, 64, 55, 0.08);
      background: rgba(255, 255, 255, 0.62);
    }

    .roller {
      display: grid;
      gap: 9px;
    }

    .roller-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .dice-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 34px;
      align-items: center;
    }

    .die {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #fff7dc;
      border: 1px solid rgba(74, 64, 55, 0.13);
      font-weight: 760;
      box-shadow: 0 2px 8px rgba(74, 64, 55, 0.08);
    }

    .mini-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: #62574e;
    }

    .mini-list button {
      width: 100%;
      min-height: 30px;
      padding: 0 9px;
      text-align: left;
      box-shadow: none;
      background: rgba(255, 255, 255, 0.72);
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      font-size: 12px;
      color: #62574e;
    }

    .swatch {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      border: 1px solid rgba(74, 64, 55, 0.10);
      flex: 0 0 auto;
    }

    .tooltip {
      position: fixed;
      z-index: 20;
      max-width: min(320px, calc(100vw - 32px));
      padding: 9px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(74, 64, 55, 0.12);
      box-shadow: var(--shadow);
      color: var(--ink);
      font-size: 12px;
      line-height: 1.45;
      pointer-events: none;
      opacity: 0;
      transform: translate(8px, 8px);
      transition: opacity 120ms ease;
      white-space: pre-line;
    }

    .tooltip.show {
      opacity: 1;
    }

    .round-end-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(56, 47, 40, 0.28);
      backdrop-filter: blur(5px);
    }

    .round-end-modal[hidden] {
      display: none !important;
    }

    .round-end-dialog {
      width: min(360px, calc(100vw - 40px));
      padding: 28px 26px 24px;
      border: 1px solid rgba(185, 179, 167, 0.28);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.98);
      box-shadow: 0 24px 70px rgba(74, 64, 55, 0.22);
      text-align: center;
    }

    .round-end-mark {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff0d3;
      color: #d8791e;
      font-size: 24px;
    }

    .round-end-dialog h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
    }

    .round-end-dialog p {
      margin: 10px 0 20px;
      color: #81766d;
      font-size: 14px;
      line-height: 1.65;
    }

    .round-end-dialog button {
      width: 100%;
      min-height: 42px;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        min-height: 100%;
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(560px, 72vh) auto;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: minmax(0, 1fr) repeat(2, auto);
      }

      .controls select {
        display: none;
      }

      .side {
        border-left: 0;
        border-top: 1px solid rgba(185, 179, 167, 0.36);
      }
    }

    @media (max-width: 560px) {
      .topbar {
        padding: 12px;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .controls input {
        grid-column: 1 / -1;
      }

      .subtitle {
        white-space: normal;
      }

      .side {
        padding: 12px;
      }
    }
    /* Layout refresh based on the reference screen */
    body {
      background:
        radial-gradient(circle at 46% 42%, rgba(255, 238, 184, 0.58) 0, rgba(255, 248, 226, 0.3) 18rem, transparent 34rem),
        linear-gradient(115deg, #fffdf8 0%, #f7fbff 55%, #f8f3ff 100%);
    }

    .app {
      grid-template-columns: 370px minmax(0, 1fr) 400px;
      grid-template-rows: 80px minmax(0, 1fr);
      background: rgba(255, 255, 255, 0.18);
    }

    .topbar {
      height: 80px;
      padding: 0 40px;
      grid-column: 1 / -1;
      grid-template-columns: minmax(300px, 1fr) auto;
      background: rgba(255, 253, 248, 0.88);
      border-bottom: 1px solid rgba(185, 179, 167, 0.24);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(145deg, #fff5cf, #f1efff);
      box-shadow: 0 8px 24px rgba(216, 137, 150, 0.18);
      font-size: 24px;
    }

    h1 {
      font-size: 30px;
      font-weight: 720;
    }

    .top-stats {
      display: flex;
      align-items: center;
      gap: 34px;
      text-align: center;
    }

    .music-control {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 22px;
      border-right: 1px solid rgba(185, 179, 167, 0.28);
    }

    .music-control button {
      width: 38px;
      min-width: 38px;
      height: 38px;
      min-height: 38px;
      padding: 0;
      display: grid;
      place-items: center;
      border-color: rgba(216, 137, 150, 0.3);
      background: rgba(255, 250, 238, 0.92);
      color: #c36e28;
      font-size: 19px;
      box-shadow: none;
    }

    .music-control button[aria-pressed="true"] {
      border-color: #efaa4c;
      background: #fff0d3;
      color: #a85a18;
    }

    .music-control input[type="range"] {
      width: 82px;
      min-height: 24px;
      padding: 0;
      border: 0;
      background: transparent;
      accent-color: #e59b3a;
      box-shadow: none;
      cursor: pointer;
    }

    h1 {
      font-family: "SimSun", "宋体", "STSong", serif !important;
    }

    .top-stats strong {
      display: block;
      color: #f08a14;
      font-size: 22px;
      line-height: 1.1;
    }

    .top-stats span {
      display: block;
      margin-top: 5px;
      color: #b2a79d;
      font-size: 12px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .left-panel {
      min-height: 0;
      display: block;
      overflow: hidden;
      border-right: 1px solid rgba(185, 179, 167, 0.28);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
    }

    .left-scroll {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }

    .filter-section {
      padding: 22px 20px;
      border-bottom: 1px solid rgba(185, 179, 167, 0.2);
    }

    .grow-section {
      min-height: 0;
      overflow: hidden;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .search-row input {
      height: 45px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      font-size: 14px;
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      min-height: 35px;
      padding: 0 13px;
      border-color: rgba(74, 64, 55, 0.09);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: none;
      font-size: 13px;
      color: #8a8178;
    }

    .filter-btn.active,
    .filter-btn:hover {
      color: #9d5a0b;
      border-color: #f3a533;
      background: #fff2d9;
    }

    .chip-list {
      max-height: 100%;
      overflow: auto;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
      padding-right: 2px;
    }

    .chip-list .filter-btn {
      min-height: 31px;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .left-actions {
      display: grid;
      gap: 10px;
      padding: 16px 20px 22px;
      background: rgba(255, 255, 255, 0.62);
    }

    .primary-action {
      min-height: 50px;
      color: #fff;
      border: 0;
      background: linear-gradient(135deg, #f6b44a, #df8d1d);
      font-weight: 760;
      box-shadow: 0 12px 26px rgba(222, 141, 29, 0.22);
    }

    #expandButton {
      width: 100%;
      min-height: 38px;
      justify-self: stretch;
      padding: 0 14px;
      font-size: 14px;
      box-shadow: 0 8px 18px rgba(222, 141, 29, 0.18);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .stage {
      grid-column: 2;
      grid-row: 2;
      background: rgba(255, 255, 255, 0.28);
    }

    .stage-toolbar {
      position: absolute;
      z-index: 4;
      top: 18px;
      right: 24px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .stage-toolbar button {
      min-height: 38px;
      background: rgba(255, 255, 255, 0.88);
    }

    .stage-toolbar #resetButton {
      border-color: rgba(216, 137, 150, 0.34);
      background: linear-gradient(135deg, #ffd99d, #f9c3d2);
      color: #8a4f12;
      font-weight: 760;
    }

    .canvas-legend {
      position: absolute;
      top: 64px;
      right: 24px;
      z-index: 3;
      width: 170px;
      padding: 16px 18px;
      border-radius: 10px;
      border: 1px solid rgba(185, 179, 167, 0.22);
      background: rgba(255, 252, 245, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .canvas-legend .legend {
      grid-template-columns: 1fr;
      margin-top: 0;
    }

    .graph-meta {
      left: 24px;
      bottom: 20px;
    }

    .side {
      grid-column: 3;
      grid-row: 2;
      padding: 0;
      background: rgba(255, 255, 255, 0.68);
      border-left: 1px solid rgba(185, 179, 167, 0.28);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 58px;
      padding-left: 42px;
      border-bottom: 1px solid rgba(185, 179, 167, 0.22);
    }

    .tab {
      border: 0;
      border-radius: 0;
      box-shadow: none;
      background: rgba(255, 255, 255, 0.38);
      color: #a19890;
      font-weight: 760;
    }

    .tab.active {
      color: #dc7b10;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 -2px #f08a14;
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    .side .section {
      padding: 18px 20px;
    }

    .kv {
      grid-template-columns: 68px minmax(0, 1fr);
      align-items: start;
    }

    .detail-click {
      border: 0;
      min-height: 0;
      padding: 0;
      background: transparent;
      box-shadow: none;
      color: #d67812;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .detail-click:hover {
      text-decoration: underline;
    }

    .tag {
      cursor: pointer;
    }

    .tag.active,
    .bar-row.active,
    .heat-row.active,
    .heat-cell.active {
      outline: 2px solid rgba(240, 138, 20, 0.34);
      background: rgba(255, 242, 217, 0.78);
    }

    .bar-row,
    .heat-row {
      border-radius: 8px;
      padding: 2px 4px;
      cursor: pointer;
    }

    .node-group.related .node {
      filter: drop-shadow(0 0 16px rgba(240, 138, 20, 0.5));
    }

    .node-group.filter-match .node {
      stroke: #f08a14;
      stroke-width: 3;
      filter: drop-shadow(0 0 18px rgba(240, 138, 20, 0.56));
    }

    .link.highlighted {
      stroke: #f08a14;
      stroke-width: 2.8;
    }

    .node-group.dimmed {
      opacity: 0.13;
    }

    @media (max-width: 1180px) {
      body {
        overflow: auto;
      }

      .app {
        min-height: 100%;
        height: auto;
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        grid-template-rows: 80px minmax(560px, 72vh) auto;
      }

      .topbar {
        padding: 0 22px;
      }

      .top-stats {
        gap: 18px;
      }

  <script id="rule-details" type="application/json">[{"name":"福禄寿令","diceCount":1,"diceRequirement":"普通六面骰子，点数1-6，无特殊标记，适合日常酒桌。","tools":"无额外专用用具。","coreRule":"顺时针轮流摇骰。4为福，合席同饮且骰子归公；5为寿，摇骰者自饮一大杯；6为禄，摇骰者自留骰子；1-3点无效并传骰。无骰者需向持禄骰者买骰，累计6枚禄骰后令止。","cultureGroup":"吉祥礼俗"},{"name":"遇缺即升令","diceCount":1,"diceRequirement":"普通六面骰子，无特殊要求。","tools":"6只按1-6编号的空酒盏、1只酒壶。","coreRule":"轮流摇骰，摇出几点就往对应编号酒盏斟满酒。同一人先后摇出3、5点为“越级飞升”，加倍饮酒；摇出6点为“一品当朝”，本轮免摇并传骰；6只酒盏全满令止。","cultureGroup":"功名角色"},{"name":"状元游街令","diceCount":1,"diceRequirement":"普通六面骰子，点数需清晰便于众人查看。","tools":"5只小酒盏、1只大号“状元杯”、1只酒壶。","coreRule":"轮流摇骰，1-5点往对应序号小酒盏斟满且不重复；摇出4点为“状元”，饮尽状元杯后起身与全席猜拳通关。5只小杯酒全饮尽令止。","cultureGroup":"功名角色"},{"name":"一色令","diceCount":1,"diceRequirement":"普通六面骰子，适合多人快速互动。","tools":"无额外专用用具。","coreRule":"点数决定饮酒对象：1点上家饮1杯；2点下家饮1杯；3点与席间第三位客人猜三拳；4点自饮1杯；5点席间第五位饮1杯；6点与席间第六位猜六拳，人数不足时按规则顺延。","cultureGroup":"人情关系"},{"name":"六顺令","diceCount":1,"diceRequirement":"普通六面骰子，无特殊要求。","tools":"无额外专用用具。","coreRule":"每位参与者连摇六次，目标点数依次为1至6。摇中目标点数，自饮对应杯数；未摇中则按规则陪饮或敬饮。完成六次后传骰，宴席主人叫停令止。","cultureGroup":"竞技判定"},{"name":"探花令","diceCount":1,"diceRequirement":"普通六面骰子，点数清晰便于核对。","tools":"无额外专用用具。","coreRule":"先推令官，令官摇骰定“标准点”并公示。令官下家摇骰，点数与标准点相同则令官饮1杯；不同则下家自饮1杯，并成为新令官重新定标准点。","cultureGroup":"竞技判定"},{"name":"三星拱照令","diceCount":1,"diceRequirement":"普通六面骰子，操作简单。","tools":"无额外专用用具。","coreRule":"以3点为核心。摇出3点自饮1杯；4-6点时，上首分别有1、2、3人同饮；1-2点时，下首分别有2、1人同饮，人数不足由摇骰者补足。","cultureGroup":"人情关系"},{"name":"赏月令","diceCount":1,"diceRequirement":"普通六面骰子，适合中秋赏月宴席。","tools":"无额外专用用具。","coreRule":"以1为月。摇出1点，满席同饮“赏月酒”；未摇出1点，摇骰者自饮1杯，然后传骰循环。","cultureGroup":"节令意象"},{"name":"赏雪令","diceCount":1,"diceRequirement":"普通六面骰子，适合冬日赏雪宴席。","tools":"无额外专用用具。","coreRule":"以6为雪。摇出6点，满席同饮“赏雪酒”；未摇出6点，摇骰者自饮1杯，然后传骰循环。","cultureGroup":"节令意象"},{"name":"占风令","diceCount":2,"diceRequirement":"普通六面骰子，可搭配简易方位图。","tools":"无额外专用用具，可备方位图。","coreRule":"约定1为东、2为南、3为西、4为北，5、6重摇。令官摇骰定风向并盖定，客人轮流猜方位；猜中时对应方位者饮，猜错则猜者与令官同饮。","cultureGroup":"竞技判定"},{"name":"三多五福令","diceCount":2,"diceRequirement":"普通六面骰子，同时摇出并计算点数总和。","tools":"无额外专用用具。","coreRule":"3与5组合为8点时合席同饮；2与6、1与1、1与4组合免饮；其余点数和大于8时上首1人饮，小于8时下首1人饮，摇骰者均陪饮1杯。","cultureGroup":"吉祥礼俗"},{"name":"七子八婿令","diceCount":2,"diceRequirement":"普通六面骰子，摇出后计算点数总和。","tools":"无额外专用用具。","coreRule":"点数和为7时，摇骰者与席间多子者同饮；点数和为8时，摇骰者与席间多女者同饮；其余和大于8时上首1人饮，小于7时下首1人饮。","cultureGroup":"人情关系"},{"name":"五日延龄令","diceCount":2,"diceRequirement":"普通六面骰子，摇出后计算点数总和，适合端阳宴席。","tools":"无额外专用用具。","coreRule":"点数和为5时合席同饮；其余和大于5时上首1人饮，小于5时下首1人饮，摇骰者陪饮。","cultureGroup":"节令意象"},{"name":"七夕乞巧令","diceCount":2,"diceRequirement":"普通六面骰子，摇出后计算点数总和，适合七夕宴席。","tools":"无额外专用用具。","coreRule":"点数和为7时，摇骰者自饮；其余和大于7时上首1人饮，小于7时下首1人饮，摇骰者陪饮。","cultureGroup":"节令意象"},{"name":"赏花灯令","diceCount":2,"diceRequirement":"普通六面骰子，查看两个单点，无需计算总和。","tools":"无额外专用用具。","coreRule":"4为灯、5为花，同时出现4和5时合席同饮；1与4、1与5组合免饮；两骰均无4、5时，摇骰者自罚1杯。","cultureGroup":"节令意象"},{"name":"点将令","diceCount":2,"diceRequirement":"普通六面骰子，以单点4为核心。","tools":"无额外专用用具，可备将帅标识。","coreRule":"4为帅。参与者分两队，各队摇出4点者为帅；帅点将与对方猜拳，败者饮酒；所有将领出战后两帅对战，败队全体饮，败帅额外饮。","cultureGroup":"功名角色"},{"name":"猜点令","diceCount":2,"diceRequirement":"普通六面骰子，摇出后计算点数总和。","tools":"1只碗、若干酒盏。","coreRule":"令官摇骰并盖定点数和，客人轮流猜且不得重复。猜中则令官饮1巨杯，猜错则猜者自饮1杯；一轮结束后更换令官。","cultureGroup":"竞技判定"},{"name":"曹酒令","diceCount":2,"diceRequirement":"普通六面骰子，可用1枚或2枚，以单点1为核心。","tools":"1只酒海、若干酒盏。","coreRule":"摇出1点需买酒，每出现1枚一杯；无1点则免饮。全员完成一轮后，令官饮尽酒海中的剩余酒。","cultureGroup":"人情关系"},{"name":"锦团国令","diceCount":3,"diceRequirement":"普通六面骰子，需要查看点数组合与数量。","tools":"无额外专用用具。","coreRule":"对子加单数时重摇；有1点则摇骰者自饮1杯；出现对子则全席同饮；5点最多时右座饮，6点最多时对座饮；摇出4、5、6组合时合席巨饮并令止。","cultureGroup":"竞技判定"},{"name":"赶羊令","diceCount":3,"diceRequirement":"普通六面骰子，摇出后计算点数总和。","tools":"无额外专用用具。","coreRule":"令官先摇骰定“羊数”，客人轮流摇骰比大小。客人比羊数少几点就饮几杯；输家饮酒，赢家接骰继续。","cultureGroup":"竞技判定"},{"name":"三色令","diceCount":3,"diceRequirement":"可使用刻有人物、地点、事件图案或分色的特制骰子。","tools":"无额外专用用具。","coreRule":"按图案或颜色组合定采目：正采、本采免饮；杂采由摇骰者饮1杯；离奇组合由摇骰者饮双杯。","cultureGroup":"人情关系"},{"name":"连中三元令","diceCount":3,"diceRequirement":"普通六面骰子，以1点为核心。","tools":"无额外专用用具。","coreRule":"1为元。三骰均为1点即“连中三元”，席间应试者同饮；出现1至2个1点时摇骰者自饮1杯；没有1点时摇骰者自饮2杯。","cultureGroup":"功名角色"},{"name":"并头运令","diceCount":3,"diceRequirement":"普通六面骰子，以对子为核心。","tools":"无额外专用用具。","coreRule":"摇出对子为“并头”。席间有新婚者时，新婚夫妻同饮；无新婚者时，摇骰者自饮1杯。","cultureGroup":"人情关系"},{"name":"陈氏觞政图令","diceCount":3,"diceRequirement":"普通六面骰子，以4、5、6为核心点数。","tools":"无额外专用用具。","coreRule":"4为德、5为功、6为才，按三种点数出现的数量组合判定官职升降；升时全席贺饮，降时摇骰者罚饮。","cultureGroup":"功名角色"},{"name":"朱窝令（除红谱）","diceCount":4,"diceRequirement":"使用以红点为贵的四枚骰子。","tools":"无额外专用用具。","coreRule":"需恰好出现一枚红点骰；无红或两红及以上均重摇。满足条件后再按点数总和与组合判定饮罚，不同点数组合对应不同杯数。","cultureGroup":"竞技判定"},{"name":"事事如意令","diceCount":4,"diceRequirement":"普通六面骰子，以4点为核心。","tools":"无额外专用用具。","coreRule":"4为如意。累计每凑齐4个4点，摇骰者饮1杯；累计16个4点时饮双杯并令止。四枚骰子点数和为16点时称“四四如意”，全席同饮。","cultureGroup":"吉祥礼俗"},{"name":"公领孙令","diceCount":6,"diceRequirement":"普通六面骰子，以6点和1点为核心。","tools":"无额外专用用具。","coreRule":"6为公、1为孙，需先摇出6点再摇出1点。出现几个1点就有对应人数各饮1杯，孙数不少于3时饮双杯；无6点或有6无1点时，摇骰者罚饮1杯。","cultureGroup":"人情关系"},{"name":"长命富贵令","diceCount":6,"diceRequirement":"普通六面骰子，以4、5、6点为核心。","tools":"无额外专用用具。","coreRule":"4为贵、5为富、6为长命，三种点数全有时全席同饮；缺一种时可用其余点数凑补，重复点数送罚饮给上家；无法凑补则摇骰者自饮1杯。","cultureGroup":"吉祥礼俗"},{"name":"一路功名到白头令","diceCount":6,"diceRequirement":"普通六面骰子，以点数顺序为核心。","tools":"无额外专用用具。","coreRule":"轮流摇骰，累计按顺序摇出1至6即为功成名就；摇不出顺序、多摇无关点数或错摇顺序时，各罚饮1杯；凑齐完整顺序后令止。","cultureGroup":"功名角色"},{"name":"考试令（喜报登科）","diceCount":6,"diceRequirement":"6枚骰子配3枚牙牌，骰子用于拼点，牙牌用于定中式采。","tools":"3枚牙牌、若干酒盏。","coreRule":"令官用牙牌定中式采，参与者用6枚骰子拼21点。拼出的点数与中式采相符即为登科，摇骰者与报喜人对饮1杯。","cultureGroup":"功名角色"},{"name":"乌龙令（十二红）","diceCount":6,"diceRequirement":"使用以红点数量为判定依据的六枚骰子。","tools":"无额外专用用具。","coreRule":"轮流摇骰并计算红点。全黑无红为“乌龙”，不得再摇并需陪饮；猜拳输者与乌龙者同饮；累计集齐十二红后令止。","cultureGroup":"竞技判定"},{"name":"子孝双亲令","diceCount":6,"diceRequirement":"普通六面骰子，以点数总和为核心。","tools":"无额外专用用具。","coreRule":"点数和为26时全席同饮；大于26时上首1人饮，小于26时下首1人饮；小于24时摇骰者另自饮1杯。","cultureGroup":"吉祥礼俗"}]</script>

      const dimensionFilter = document.getElementById("dimensionFilter");
      const difficultyFilter = document.getElementById("difficultyFilter");
      const mechanismFilter = document.getElementById("mechanismFilter");
      const diceFilterButtons = document.getElementById("diceFilterButtons");
      const mechanismButtons = document.getElementById("mechanismButtons");
      const difficultyButtons = document.getElementById("difficultyButtons");
      const dimensionButtons = document.getElementById("dimensionButtons");
      const gamePanel = document.getElementById("gamePanel");
      const totalOrders = document.getElementById("totalOrders");
      const currentNodeStat = document.getElementById("currentNodeStat");
      const expandedLevelStat = document.getElementById("expandedLevelStat");
      const detailTab = document.getElementById("detailTab");
      const rollTab = document.getElementById("rollTab");
      const detailPane = document.getElementById("detailPane");
      const rollPane = document.getElementById("rollPane");
      const leftPanelToggle = document.getElementById("leftPanelToggle");
      const rightPanelToggle = document.getElementById("rightPanelToggle");
      const musicToggle = document.getElementById("musicToggle");
      const musicVolume = document.getElementById("musicVolume");
      const roundEndModal = document.getElementById("roundEndModal");
      const roundEndMessage = document.getElementById("roundEndMessage");
      const roundEndConfirm = document.getElementById("roundEndConfirm");

      const allNodes = [];
      const byId = new Map();
      const parentById = new Map();
      const expanded = new Set();
      const related = new Set();
      const highlightedLinks = new Set();
      let relationLeaf = null;
      let rollHighlightIds = new Set();
      let filterHighlightIds = new Set();
      let activeDetail = null;
      let selected = root;
      let visibleNodes = [];
      let visibleLinks = [];
      let transform = { x: 0, y: 0, k: 1 };
      let dragState = null;
      let filterState = { diceCount: "", dimension: "", difficulty: "", mechanism: "" };
      let gameRuleName = "";
      let gameState = {};
      let resizeTimer = 0;
      let nodeClickTimer = 0;
      let pendingNodeId = "";
      let musicAudioContext = null;
      let musicMaster = null;
      let musicDry = null;
      let musicReverb = null;
      let musicTimer = 0;
      let musicPlaying = false;
      let diceAudioContext = null;
      let roundEndTimer = 0;

      indexTree(root, null);
      populateControls();
      applyTransform();
      render();
      requestAnimationFrame(fitToVisible);
      if (totalOrders) totalOrders.textContent = String(ruleDetails.length);

      searchButton.addEventListener("click", runSearch);
      searchInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") runSearch();

      expandButton.addEventListener("click", function () {

          if (node.children && node.children.length) expanded.add(node.id);
