      });

      fitButton.addEventListener("click", fitToVisible);

      resetButton.addEventListener("click", function () {
        closeRoundEndModal();
        expanded.clear();
        related.clear();
        highlightedLinks.clear();
        relationLeaf = null;
        rollHighlightIds = new Set();
        filterHighlightIds = new Set();
        activeDetail = null;
        gameRuleName = "";
        gameState = {};
        selected = root;
        filterState = { diceCount: "", dimension: "", difficulty: "", mechanism: "" };
        dimensionFilter.value = "";
        difficultyFilter.value = "";
        mechanismFilter.value = "";
        updateFilterButtons();
        render();
        requestAnimationFrame(fitToVisible);
      });

      clearFiltersButton.addEventListener("click", clearFilters);
      zoomInButton.addEventListener("click", function () { zoomFromCenter(1.18); });
      zoomOutButton.addEventListener("click", function () { zoomFromCenter(0.85); });
      detailTab.addEventListener("click", function () { setTab("detail"); });
      rollTab.addEventListener("click", function () { setTab("roll"); });
      leftPanelToggle.addEventListener("click", function () { toggleSidebar("left"); });
      rightPanelToggle.addEventListener("click", function () { toggleSidebar("right"); });
      musicToggle.addEventListener("click", toggleMusic);
      musicVolume.addEventListener("input", updateMusicVolume);
      roundEndConfirm.addEventListener("click", closeRoundEndModal);
      roundEndModal.addEventListener("click", function (event) {
        if (event.target === roundEndModal) closeRoundEndModal();
      });
      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && !roundEndModal.hidden) closeRoundEndModal();
      });

      svg.addEventListener("pointerdown", function (event) {
        if (event.target.closest(".node-group")) return;
        svg.setPointerCapture(event.pointerId);
        svg.classList.add("dragging");
        dragState = {
          id: event.pointerId,
          sx: event.clientX,
          sy: event.clientY,
          x: transform.x,
          y: transform.y
        };
      });

      svg.addEventListener("pointermove", function (event) {
        if (!dragState || dragState.id !== event.pointerId) return;
        transform.x = dragState.x + event.clientX - dragState.sx;
        transform.y = dragState.y + event.clientY - dragState.sy;
        applyTransform();
      });

      svg.addEventListener("pointerup", endDrag);
      svg.addEventListener("pointercancel", endDrag);

      svg.addEventListener("wheel", function (event) {
        event.preventDefault();
        const rect = svg.getBoundingClientRect();
        const mx = event.clientX - rect.left;
        const my = event.clientY - rect.top;
        const nextK = clamp(transform.k * Math.exp(-event.deltaY * 0.001), 0.34, 2.8);
        const wx = (mx - transform.x) / transform.k;
        const wy = (my - transform.y) / transform.k;
        transform.x = mx - wx * nextK;
        transform.y = my - wy * nextK;
        transform.k = nextK;
        applyTransform();
      }, { passive: false });

      window.addEventListener("resize", function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(fitToVisible, 120);
      });

      function indexTree(node, parent) {
        if (node.level === "L3") {
          const details = ruleByName.get(node.name);
          node.cultureGroup = details ? details.cultureGroup : "竞技判定";
        }
        if (node.level === "L4" && node.type === "维度" && parent && parent.level === "L3") {
          node.originalValue = node.value;
          node.value = parent.cultureGroup;
          node.name = "文化：" + parent.cultureGroup;
        }
        allNodes.push(node);
        byId.set(node.id, node);
        if (parent) parentById.set(node.id, parent);
        (node.children || []).forEach(function (child) {
          indexTree(child, node);
        });
      }

      function populateControls() {
        const dimensions = ["吉祥礼俗", "节令意象", "功名角色", "人情关系", "竞技判定"];
        const difficulties = unique(allNodes.filter(function (n) { return n.level === "L3" && n.difficulty; }).map(function (n) { return n.difficulty; }));
        const mechanisms = unique(allNodes.filter(function (n) { return n.level === "L3" && n.mechanism; }).map(function (n) { return n.mechanism; }));
        appendOptions(dimensionFilter, dimensions);
        appendOptions(difficultyFilter, difficulties);
        appendOptions(mechanismFilter, mechanisms);
        createFilterButtons(diceFilterButtons, [
          { label: "全部", value: "" },
          { label: "一枚", value: "1" },
          { label: "两枚", value: "2" },
          { label: "三枚", value: "3" },
          { label: "四枚+", value: "4" }
        ], "diceCount");
        createFilterButtons(mechanismButtons, [
          { label: "全部", value: "" },
          { label: "单点", value: "单点对应类" },
          { label: "点数和", value: "点数和对应类" },
          { label: "组合", value: "组合对应类" }
        ], "mechanism");
        createFilterButtons(difficultyButtons, [
          { label: "全部", value: "" },
          { label: "低难度", value: "低" },
          { label: "中难度", value: "中" },
          { label: "高难度", value: "高" }
        ], "difficulty");
        createFilterButtons(dimensionButtons, [{ label: "全部", value: "" }].concat(dimensions.map(function (value) {
          return { label: value, value: value };
        })), "dimension");

        const suggestions = document.getElementById("searchSuggestions");
        allNodes.filter(function (node) {
          return node.level === "L3" || node.level === "L4";
        }).slice(0, 260).forEach(function (node) {
          const option = document.createElement("option");
          option.value = node.name;
          suggestions.appendChild(option);
        });
      }

      function createFilterButtons(container, items, field) {
        container.replaceChildren();
        items.forEach(function (item) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "filter-btn";
          button.dataset.filterField = field;
          button.dataset.filterValue = item.value;
          button.textContent = item.label;
          button.addEventListener("click", function () {
            setFilter(field, item.value);
          });
          container.appendChild(button);
        });
      }

      function appendOptions(select, values) {
        values.forEach(function (value) {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          select.appendChild(option);
        });
      }

      function render() {
        related.clear();
        highlightedLinks.clear();
        filterHighlightIds = new Set();
        if (selected) markPath(selected);
        if (relationLeaf) markRelatedForLeaf(relationLeaf);
        rollHighlightIds.forEach(function (id) { related.add(id); });
        if (filtersActive()) markFilterMatches();
        if (activeDetail && activeDetail.field === "keyword") markDetailMatches(activeDetail.field, activeDetail.value);
        visibleNodes = [];
        visibleLinks = [];
        collectVisible(root);
        computeLayout();
        drawLinks();
        drawNodes();
        renderDetail();
        renderGame();
        visibleCount.textContent = "可见 " + visibleNodes.length + " / " + allNodes.length;
        hintLabel.textContent = makeHint();
        currentNodeStat.textContent = String(visibleNodes.length);
        expandedLevelStat.textContent = deepestVisibleLevel();
        updateFilterButtons();
      }

      function collectVisible(node) {
        visibleNodes.push(node);
        if (!expanded.has(node.id)) return;
        (node.children || []).forEach(function (child) {
          visibleLinks.push({ source: node, target: child });
          collectVisible(child);
        });
      }

      function computeLayout() {
        function measure(node) {
          const kids = expanded.has(node.id) ? (node.children || []) : [];
          if (!kids.length) {
            node._span = Math.max(1, node.level === "L4" ? 0.72 : 1);
            return node._span;
          }
          node._span = kids.reduce(function (sum, child) { return sum + measure(child); }, 0);
          return node._span;
        }

        function assign(node, start, end, depth) {
          const angle = (start + end) / 2;
          node._angle = angle;
          node._depth = depth;
          node._radius = radiusFor(node);
          if (node.id === root.id) {
            node._x = 0;
            node._y = 0;
          } else {
            node._x = Math.cos(angle) * node._radius;
            node._y = Math.sin(angle) * node._radius;
          }

          const kids = expanded.has(node.id) ? (node.children || []) : [];
          let cursor = start;
          kids.forEach(function (child) {
            const width = (end - start) * (child._span / node._span);
            assign(child, cursor, cursor + width, depth + 1);
            cursor += width;
          });
        }

        const span = measure(root);
        const margin = visibleNodes.length < 8 ? Math.PI / 3 : Math.PI / 24;
        root._span = span;
        assign(root, -Math.PI / 2 + margin, Math.PI * 1.5 - margin, 0);
      }

      function radiusFor(node) {
        if (node.level === "L0") return 0;
        if (node.level === "L1") return 138;
        if (node.level === "L2") return 270;
        if (node.level === "L3") return 430;
        return 575;
      }

      function drawLinks() {
        linkLayer.replaceChildren();
        const fragment = document.createDocumentFragment();
        visibleLinks.forEach(function (link) {
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("class", linkClass(link));
          path.setAttribute("d", linkPath(link.source, link.target));
          fragment.appendChild(path);
        });
        linkLayer.appendChild(fragment);
      }

      function linkPath(source, target) {
        const mid = (source._radius + target._radius) / 2;
        const c1 = polar(source._angle, mid);
        const c2 = polar(target._angle, mid);
        return "M" + source._x.toFixed(2) + "," + source._y.toFixed(2) +
          " C" + c1.x.toFixed(2) + "," + c1.y.toFixed(2) +
          " " + c2.x.toFixed(2) + "," + c2.y.toFixed(2) +
          " " + target._x.toFixed(2) + "," + target._y.toFixed(2);
      }

      function linkClass(link) {
        const targetId = link.target.id;
        const classes = ["link"];
        if (highlightedLinks.has(targetId)) classes.push("highlighted");
        if (!nodePassesFilters(link.target) && filtersActive()) classes.push("dimmed");
        return classes.join(" ");
      }

      function drawNodes() {
        nodeLayer.replaceChildren();
        const fragment = document.createDocumentFragment();
        visibleNodes.forEach(function (node) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          const classes = ["node-group"];
          if (node.id === selected.id) classes.push("selected");
          if (related.has(node.id)) classes.push("related");
          if (filterHighlightIds.has(node.id)) classes.push("filter-match");
          if (!nodePassesFilters(node) && filtersActive()) classes.push("dimmed");
          if (node.level === "L4" && visibleNodes.length > 120) classes.push("hidden-label");
          group.setAttribute("class", classes.join(" "));
          group.setAttribute("transform", "translate(" + node._x.toFixed(2) + " " + node._y.toFixed(2) + ")");
          group.setAttribute("data-id", node.id);

          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("class", "node");
          circle.setAttribute("r", String(nodeRadius(node)));
          circle.setAttribute("fill", nodeColor(node));
          group.appendChild(circle);

          const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
          label.setAttribute("class", "node-label level-" + node.level);
          label.setAttribute("font-size", String(labelSize(node)));
          const labelOffset = nodeRadius(node) + (node.level === "L0" ? 0 : 7);
          if (node.level === "L0") {
            label.setAttribute("text-anchor", "middle");
            label.setAttribute("dy", "4");
          } else {
            const rightSide = Math.cos(node._angle) >= 0;
            label.setAttribute("x", String(rightSide ? labelOffset : -labelOffset));
            label.setAttribute("dy", "4");
            label.setAttribute("text-anchor", rightSide ? "start" : "end");
          }
          label.textContent = displayName(node);
          group.appendChild(label);

          group.addEventListener("click", function (event) {
            event.stopPropagation();
            queueNodeClick(node);
          });
          group.addEventListener("dblclick", function (event) {
            event.preventDefault();
            event.stopPropagation();
          });
          group.addEventListener("pointerenter", function (event) {
            showTooltip(node, event);
          });
          group.addEventListener("pointermove", function (event) {
            moveTooltip(event);
          });
          group.addEventListener("pointerleave", hideTooltip);
          fragment.appendChild(group);
        });
        nodeLayer.appendChild(fragment);
      }

      function handleNodeClick(node) {
        closeRoundEndModal();
        selected = node;
        if (node.children && node.children.length) {
          relationLeaf = null;
          rollHighlightIds = new Set();
          expanded.add(node.id);
          render();
          createBurst(node);
        } else {
          relationLeaf = node;
          rollHighlightIds = new Set();
          render();
        }
      }

      function queueNodeClick(node) {
        if (nodeClickTimer && pendingNodeId === node.id) {
          clearTimeout(nodeClickTimer);
          nodeClickTimer = 0;
          pendingNodeId = "";
          handleNodeDoubleClick(node);
          return;
        }
        if (nodeClickTimer) clearTimeout(nodeClickTimer);
        pendingNodeId = node.id;
        nodeClickTimer = setTimeout(function () {
          nodeClickTimer = 0;
          pendingNodeId = "";
          handleNodeClick(node);
        }, 220);
      }

      function handleNodeDoubleClick(node) {
        if (!node.children || !node.children.length) return;
        selected = node;
        relationLeaf = null;
        rollHighlightIds = new Set();
        collapseBranch(node);
        render();
      }

      function collapseBranch(node) {
        expanded.delete(node.id);
        (node.children || []).forEach(collapseBranch);
      }

      function selectNode(node, reveal) {
        selected = node;
        relationLeaf = null;
        rollHighlightIds = new Set();
        if (reveal) revealNode(node);
        render();
      }

      function revealNode(node) {
        let current = node;
        while (parentById.has(current.id)) {
          const parent = parentById.get(current.id);
          expanded.add(parent.id);
          current = parent;
        }
      }

      function markPath(node) {
        let current = node;
        related.add(current.id);
        while (parentById.has(current.id)) {
          const parent = parentById.get(current.id);
          highlightedLinks.add(current.id);
          related.add(parent.id);
          current = parent;
        }
      }

      function markRelatedForLeaf(node) {
        markPath(node);
        const parent = parentById.get(node.id);
        const nodeType = node.type || "";
        const nodeValue = normalValue(node.value || node.name);
        allNodes.forEach(function (candidate) {
          const parentCandidate = parentById.get(candidate.id);
          if (candidate.level === "L4" && candidate.type === nodeType && valuesOverlap(candidate.value || candidate.name, node.value || node.name)) {
            related.add(candidate.id);
            if (parentCandidate) related.add(parentCandidate.id);
          }
          if (candidate.level === "L3" && parent && parent.level === "L3") {
            if (nodeType === "维度" && candidate.dimension === parent.dimension) related.add(candidate.id);
            if (nodeType === "难度" && candidate.difficulty === parent.difficulty) related.add(candidate.id);
            if (nodeType === "关键词" && valuesOverlap(candidate.keywords || [], nodeValue)) related.add(candidate.id);
          }
        });
      }

      function setFilter(field, value) {
        const nextValue = filterState[field] === value ? "" : value;
        filterState[field] = nextValue;
        activeDetail = nextValue ? { field: field, value: nextValue } : null;
        syncFilterSelects();
        relationLeaf = null;
        rollHighlightIds = new Set();
        revealFilterMatches();
        render();
        requestAnimationFrame(fitToFilterMatches);
      }

      function clearFilters() {
        filterState = { diceCount: "", dimension: "", difficulty: "", mechanism: "" };
        activeDetail = null;
        relationLeaf = null;
        rollHighlightIds = new Set();
        syncFilterSelects();
        render();
        requestAnimationFrame(fitToVisible);
      }

      function syncFilterSelects() {
        dimensionFilter.value = filterState.dimension || "";
        difficultyFilter.value = filterState.difficulty || "";
        mechanismFilter.value = filterState.mechanism || "";
      }

      function bindFilterElement(el) {
        el.addEventListener("click", function (event) {
          event.stopPropagation();
          setFilter(el.dataset.filterField, el.dataset.filterValue);
        });
      }

      function handleDetailClick(field, value) {
        if (!field || !value) return;
        if (field === "keyword") {
          activeDetail = activeDetail && activeDetail.field === field && activeDetail.value === value ? null : { field: field, value: value };
          relationLeaf = null;
          rollHighlightIds = new Set();
          revealDetailMatches(field, value);
          render();
          requestAnimationFrame(fitToFilterMatches);
          return;
        }
        setFilter(field, value);
      }

      function revealFilterMatches() {
        getFilterMatches().forEach(revealNode);
      }

      function revealDetailMatches(field, value) {
        getDetailMatches(field, value).forEach(revealNode);
      }

      function getFilterMatches() {
        if (!filtersActive()) return [];
        return allNodes.filter(function (node) {
          return node.level === "L3" && directFilterMatch(node);
        });
      }

      function getDetailMatches(field, value) {
        return allNodes.filter(function (node) {
          if (node.level === "L3") {
            if (field === "keyword") return (node.keywords || []).some(function (keyword) { return keyword === value; });
            if (field === "diceCount") return String(node.diceCount || "") === String(value);
            return node[field] === value;
          }
          if (node.level === "L4" && field === "keyword" && node.type === "关键词") {
            return valuesOverlap(node.value || [], value);
          }
          return false;
        });
      }

      function markFilterMatches() {
        getFilterMatches().forEach(function (node) {
          filterHighlightIds.add(node.id);
          markPath(node);
          (node.children || []).forEach(function (child) {
            if (nodePassesFilterDetail(child)) filterHighlightIds.add(child.id);
          });
        });
      }

      function markDetailMatches(field, value) {
        getDetailMatches(field, value).forEach(function (node) {
          filterHighlightIds.add(node.id);
          markPath(node);
        });
      }

      function nodePassesFilterDetail(node) {
        if (!activeDetail) return false;
        if (activeDetail.field === "dimension" && node.type === "维度") return node.value === activeDetail.value;
        if (activeDetail.field === "difficulty" && node.type === "难度") return node.value === activeDetail.value;
        if (activeDetail.field === "keyword" && node.type === "关键词") return valuesOverlap(node.value || [], activeDetail.value);
        if (activeDetail.field === "mechanism") return false;
        if (activeDetail.field === "diceCount") return false;
        return false;
      }

      function updateFilterButtons() {
        document.querySelectorAll("[data-filter-field]").forEach(function (el) {
          const field = el.dataset.filterField;
          const value = el.dataset.filterValue || "";
          const isActive = filterState[field] === value || (!value && !filterState[field] && el.classList.contains("filter-btn"));
          el.classList.toggle("active", Boolean(isActive));
        });
      }

      function deepestVisibleLevel() {
        const order = ["L0", "L1", "L2", "L3", "L4"];
        const max = visibleNodes.reduce(function (result, node) {
          return Math.max(result, order.indexOf(node.level));
        }, 0);
        return order[Math.max(0, max)] || "L0";
      }

      function fieldFromL4(node) {
        if (node.type === "维度") return "dimension";
        if (node.type === "难度") return "difficulty";
        if (node.type === "关键词") return "keyword";
        return "";
      }

      function valueFromL4(node) {
        if (node.type === "关键词" && Array.isArray(node.value)) return node.value[0] || "";
        return valueText(node.value);
      }

      function renderDetail() {
        const node = selected && selected.level === "L3" ? selected : nearestLevel(selected, "L3");
        const details = node ? ruleByName.get(node.name) : null;
        if (!node || !details) {
          detailPanel.innerHTML = "<div class=\"detail-placeholder\"><div>点击图中的酒令名称<br>这里会显示它的用骰、用具与完整规则</div></div>";
          return;
        }
        detailPanel.innerHTML =
          "<div class=\"detail-sheet\">" +
            "<div class=\"detail-heading\">" +
              "<h2 class=\"detail-title\">" + esc(details.name) + "</h2>" +
              "<div class=\"detail-kicker\">用骰 " + details.diceCount + " 枚</div>" +
            "</div>" +
            detailBlock("用骰要求", details.diceRequirement) +
            detailBlock("必备用具", details.tools) +
            detailBlock("核心规则", details.coreRule) +
          "</div>";
      }

      function detailBlock(label, text) {
        return "<div class=\"detail-block\"><h3>" + esc(label) + "</h3><p>" + esc(text) + "</p></div>";
      }

      function runSearch() {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) return;
        const target = allNodes.find(function (node) {
          return searchableText(node).toLowerCase().includes(query);
        });
        if (!target) {
          hintLabel.textContent = "没有找到匹配节点";
          return;
        }
        selected = target;
        relationLeaf = null;
        rollHighlightIds = new Set();
        revealNode(target);
        render();
        requestAnimationFrame(function () {
          centerOnNode(target);
          const group = nodeLayer.querySelector("[data-id=\"" + cssEscape(target.id) + "\"]");
          if (group) {
            group.animate([
              { opacity: 0.38 },
              { opacity: 1 }
            ], { duration: 420, easing: "cubic-bezier(.2,.8,.2,1)" });
          }
        });
      }

      function renderGame() {
        const node = selected && selected.level === "L3" ? selected : nearestLevel(selected, "L3");
        const details = node ? ruleByName.get(node.name) : null;
        if (!node || !details) {
          gamePanel.innerHTML = "<div class=\"detail-placeholder\"><div>先在图中选择一个酒令<br>这里会出现对应的互动玩法</div></div>";
          return;
        }
        if (gameRuleName !== details.name) {
          gameRuleName = details.name;
          gameState = createGameState(details.name);
        }

        const diceHtml = gameState.lastRoll.length
          ? gameState.lastRoll.map(function (value) {
              return "<span class=\"game-die\" aria-label=\"" + value + "点\">" + diceGlyph(value) + "</span>";
            }).join("")
          : "<span class=\"empty\">等待投掷</span>";
        const resultClass = gameState.tone ? " " + gameState.tone : "";
        gamePanel.innerHTML =
          "<div class=\"game-shell\">" +
            "<div class=\"game-head\"><strong>" + esc(details.name) + "</strong><span>本局使用 " + details.diceCount + " 枚骰子，结果按本令规则即时判定。</span></div>" +
            gameSetupHtml(details.name) +
            "<div class=\"game-actions\">" +
              "<button class=\"primary-action\" id=\"gameRollButton\" type=\"button\">🎲 投掷 " + details.diceCount + " 枚骰子</button>" +
              "<button id=\"gameResetButton\" type=\"button\" title=\"重新开局\" aria-label=\"重新开局\">↺</button>" +
            "</div>" +
            "<div class=\"game-dice\">" + diceHtml + "</div>" +
            "<div class=\"game-result" + resultClass + "\">" + esc(gameState.message) + "</div>" +
            "<div class=\"game-progress\">" + gameProgressHtml(details.name) + "</div>" +
            "<div class=\"game-note\">" + esc(gameNote(details.name)) + "</div>" +
          "</div>";

        document.getElementById("gameRollButton").addEventListener("click", rollCurrentGame);
        document.getElementById("gameResetButton").addEventListener("click", function () {
          closeRoundEndModal();
          gameState = createGameState(details.name);
          rollHighlightIds = new Set();
          render();
        });
        const guessInput = document.getElementById("gameGuess");
        if (guessInput) {
          guessInput.addEventListener("input", function () {
            gameState.guess = clamp(Number(guessInput.value) || 2, 2, 12);
          });
        }
        const directionSelect = document.getElementById("gameDirection");
        if (directionSelect) {
          directionSelect.addEventListener("change", function () {
            gameState.direction = directionSelect.value;
          });
        }
      }

      function createGameState(name) {
        return {
          name: name,
          round: 0,
          lastRoll: [],
          message: "点击投掷，开始本局。",
          tone: "",
          filled: [],
          target: null,
          standard: null,
          next: 1,
          luCount: 0,
          fourCount: 0,
          redTotal: 0,
          hasGrand: false,
          guess: 7,
          direction: "东",
          lastPoint: null
        };
      }

      function gameSetupHtml(name) {
        if (name === "猜点令") {
          return "<div class=\"game-setup\"><label for=\"gameGuess\">先猜两枚骰子的总点数</label><input id=\"gameGuess\" type=\"number\" min=\"2\" max=\"12\" value=\"" + gameState.guess + "\"></div>";
        }
        if (name === "占风令") {
          return "<div class=\"game-setup\"><label for=\"gameDirection\">先猜风向</label><select id=\"gameDirection\">" +
            ["东", "南", "西", "北"].map(function (value) {
              return "<option value=\"" + value + "\"" + (gameState.direction === value ? " selected" : "") + ">" + value + "</option>";
            }).join("") +
          "</select></div>";
        }
        return "";
      }

      function gameProgressHtml(name) {
        if (name === "福禄寿令") return progressChip("禄骰 " + gameState.luCount + " / 6", gameState.luCount >= 6);
        if (name === "遇缺即升令" || name === "状元游街令") {
          const limit = name === "遇缺即升令" ? 6 : 5;
          return Array.from({ length: limit }, function (_, index) {
            const value = index + 1;
            return progressChip(value + "号", gameState.filled.includes(value));
          }).join("");
        }
        if (name === "六顺令") {
          return Array.from({ length: 6 }, function (_, index) {
            const value = index + 1;
            return progressChip(String(value), value < gameState.next);
          }).join("");
        }
        if (name === "探花令") return progressChip(gameState.standard ? "标准点 " + gameState.standard : "等待令官定点", Boolean(gameState.standard));
        if (name === "赶羊令") return progressChip(gameState.target ? "羊数 " + gameState.target : "等待令官定羊数", Boolean(gameState.target));
        if (name === "事事如意令") return progressChip("累计四点 " + gameState.fourCount + " / 16", gameState.fourCount >= 16);
        if (name === "公领孙令") return progressChip(gameState.hasGrand ? "已见公点 6" : "先寻公点 6", gameState.hasGrand);
        if (name === "一路功名到白头令") {
          return Array.from({ length: 6 }, function (_, index) {
            const value = index + 1;
            return progressChip(String(value), value < gameState.next);
          }).join("");
        }
        if (name === "乌龙令（十二红）") return progressChip("累计红点 " + gameState.redTotal + " / 12", gameState.redTotal >= 12);
        return progressChip("第 " + gameState.round + " 轮", gameState.round > 0);
      }

      function progressChip(text, done) {
        return "<span class=\"progress-chip" + (done ? " done" : "") + "\">" + esc(text) + "</span>";
      }

      function gameNote(name) {
        if (name === "三色令") return "特制色骰以数字分组模拟：1-2为红，3-4为青，5-6为白。";
        if (name === "朱窝令（除红谱）" || name === "乌龙令（十二红）") return "数字版按传统骰面模拟红点：1点与4点计作红色骰面。";
        if (name === "考试令（喜报登科）") return "本版先模拟“六骰拼21点”，牙牌中式采仍按原令现场约定。";
        return "互动结果用于体验传统规则；实际行令时可按席间人数与约定调整。";
      }

      function rollCurrentGame() {
        const details = ruleByName.get(gameRuleName);
        if (!details) return;
        playDiceRollSound();
        const rolls = Array.from({ length: details.diceCount }, function () {
          return 1 + Math.floor(Math.random() * 6);
        });
        gameState.round += 1;
        gameState.lastRoll = rolls;
        const outcome = evaluateRule(details.name, rolls);
        gameState.message = outcome.message;
        gameState.tone = outcome.tone || "";
        if (isRoundEnding(outcome.message)) {
          queueRoundEndModal(details.name);
        } else {
          playGameOutcomeSound(outcome);
        }
        relationLeaf = null;
        activeDetail = null;
        highlightRuleName(details.name);
        render();
      }

      function highlightRuleName(name) {
        rollHighlightIds = new Set();
        allNodes.filter(function (node) {
          return node.level === "L3" && node.name === name;
        }).forEach(function (node) {
          revealNode(node);
          let current = node;
          rollHighlightIds.add(current.id);
          while (parentById.has(current.id)) {
            current = parentById.get(current.id);
            rollHighlightIds.add(current.id);
          }
        });
      }

      function evaluateRule(name, rolls) {
        const total = rolls.reduce(function (value, item) { return value + item; }, 0);
        const sorted = rolls.slice().sort(function (a, b) { return a - b; });
        const countOf = function (value) {
          return rolls.filter(function (item) { return item === value; }).length;
        };
        const uniqueCount = new Set(rolls).size;
        const first = rolls[0];

        switch (name) {
          case "福禄寿令":
            if (first === 4) return gameOutcome("福到：合席同饮，骰子归公。", "win", "fulu-fu");
            if (first === 5) return gameOutcome("寿到：摇骰者自饮一大杯。", "penalty", "fulu-shou");
            if (first === 6) {
              gameState.luCount += 1;
              return gameOutcome(gameState.luCount >= 6 ? "六枚禄骰已齐，本令结束。" : "禄到：自留骰子，当前共 " + gameState.luCount + " 枚。", "win", "fulu-lu");
            }
            return gameOutcome(first + "点无采，传骰给下一位。", "", "fulu-pass");

          case "遇缺即升令": {
            const wasFilled = gameState.filled.includes(first);
            if (!wasFilled) gameState.filled.push(first);
            let message = wasFilled ? first + "号酒盏已经斟满，本次不重复斟酒。" : "斟满 " + first + " 号酒盏。";
            if (gameState.lastPoint === 3 && first === 5) message += " 先3后5，越级飞升，加倍饮酒。";
            if (first === 6) message += " 一品当朝，本轮免摇并传骰。";
            gameState.lastPoint = first;
            if (gameState.filled.length >= 6) message += " 六盏皆满，本令结束。";
            return gameOutcome(message, gameState.filled.length >= 6 ? "win" : "");
          }

          case "状元游街令": {
            if (first <= 5 && !gameState.filled.includes(first)) gameState.filled.push(first);
            let message = first <= 5 ? "斟满 " + first + " 号小酒盏。" : "6点不入五盏，本轮传骰。";
            if (first === 4) message += " 状元出街：饮状元杯并与全席猜拳通关。";
            if (gameState.filled.length >= 5) message += " 五只小杯已齐，本令结束。";
            return gameOutcome(message, first === 4 || gameState.filled.length >= 5 ? "win" : "");
          }

          case "一色令": {
            const actions = {
              1: "上家饮1杯。",
              2: "下家饮1杯。",
              3: "与席间第三位客人猜三拳，输一拳饮一杯。",
              4: "摇骰者自饮1杯。",
              5: "席间第五位饮1杯，人数不足则传骰。",
              6: "与席间第六位猜六拳，人数不足则与末位猜。"
            };
            return gameOutcome(actions[first], first === 4 ? "penalty" : "");
          }

          case "六顺令":
            if (first === gameState.next) {
              const hit = gameState.next;
              gameState.next += 1;
              return gameOutcome(gameState.next > 6 ? "命中6点并完成六顺，本轮功成。" : "命中目标 " + hit + " 点，自饮 " + hit + " 杯；下一目标是 " + gameState.next + " 点。", "win");
            }
            return gameOutcome("本轮目标为 " + gameState.next + " 点，掷出 " + first + " 点，按席间约定陪饮或敬饮。", "penalty");

          case "探花令":
            if (!gameState.standard) {
              gameState.standard = first;
              return gameOutcome("令官定下标准点 " + first + "，请下一位继续投掷。", "win");
            }
            if (first === gameState.standard) return gameOutcome("命中标准点 " + first + "，令官饮1杯。", "win");
            gameState.standard = first;
            return gameOutcome("未命中，摇骰者饮1杯并成为新令官；新标准点为 " + first + "。", "penalty");

          case "三星拱照令":
            if (first === 3) return gameOutcome("三星当中，摇骰者自饮1杯。", "penalty");
            if (first > 3) return gameOutcome(first + "点：上首 " + (first - 3) + " 人同饮。", "");
            return gameOutcome(first + "点：下首 " + (3 - first) + " 人同饮，人数不足由摇骰者补足。", "");

          case "赏月令":
            return first === 1 ? gameOutcome("月出：满席同饮赏月酒。", "win") : gameOutcome("未见月，摇骰者自饮1杯。", "penalty");

          case "赏雪令":
            return first === 6 ? gameOutcome("雪落：满席同饮赏雪酒。", "win") : gameOutcome("未见雪，摇骰者自饮1杯。", "penalty");

          case "占风令": {
            const wind = { 1: "东", 2: "南", 3: "西", 4: "北" }[first];
            if (!wind) return gameOutcome(first + "点不定方位，请重摇。", "");
            return wind === gameState.direction
              ? gameOutcome("风从" + wind + "来，猜中方位；对应方位者饮。", "win")
              : gameOutcome("风从" + wind + "来，未猜中；猜者与令官同饮。", "penalty");
          }

          case "三多五福令": {
            const key = sorted.join("-");
            if (key === "3-5") return gameOutcome("三多五福，合席同饮。", "win");
            if (["2-6", "1-1", "1-4"].includes(key)) return gameOutcome("吉祥免饮组合，本轮免饮。", "win");
            if (total > 8) return gameOutcome("合计 " + total + "，上首1人饮，摇骰者陪饮1杯。", "penalty");
            if (total < 8) return gameOutcome("合计 " + total + "，下首1人饮，摇骰者陪饮1杯。", "penalty");
            return gameOutcome("合计8点但不是3与5组合，本轮无特别采目。", "");
          }

          case "七子八婿令":
            if (total === 7) return gameOutcome("七子：摇骰者与席间多子者同饮。", "win");
            if (total === 8) return gameOutcome("八婿：摇骰者与席间多女者同饮。", "win");
            return total > 8 ? gameOutcome("合计 " + total + "，上首1人饮。", "") : gameOutcome("合计 " + total + "，下首1人饮。", "");

          case "五日延龄令":
            if (total === 5) return gameOutcome("五日延龄，合席同饮。", "win");
            return total > 5 ? gameOutcome("合计 " + total + "，上首1人饮，摇骰者陪饮。", "penalty") : gameOutcome("合计 " + total + "，下首1人饮，摇骰者陪饮。", "penalty");

          case "七夕乞巧令":
            if (total === 7) return gameOutcome("七夕得巧，摇骰者自饮。", "win");
            return total > 7 ? gameOutcome("合计 " + total + "，上首1人饮，摇骰者陪饮。", "penalty") : gameOutcome("合计 " + total + "，下首1人饮，摇骰者陪饮。", "penalty");

          case "赏花灯令":
            if (rolls.includes(4) && rolls.includes(5)) return gameOutcome("花灯同现，合席同饮。", "win");
            if (rolls.includes(1) && (rolls.includes(4) || rolls.includes(5))) return gameOutcome("一与花灯相合，本轮免饮。", "win");
            if (!rolls.includes(4) && !rolls.includes(5)) return gameOutcome("无花无灯，摇骰者自罚1杯。", "penalty");
            return gameOutcome("只见花或灯，按席间约定传骰。", "");

          case "点将令": {
            const commanders = countOf(4);
            return commanders ? gameOutcome("出现 " + commanders + " 个4点，选出对应数量的“帅”进入点将与猜拳。", "win") : gameOutcome("本轮未见4点，尚未点出主帅。", "");
          }

          case "猜点令":
            return total === gameState.guess
              ? gameOutcome("合计 " + total + "，猜中！令官饮1巨杯。", "win")
              : gameOutcome("合计 " + total + "，与所猜 " + gameState.guess + " 点不同，猜者自饮1杯。", "penalty");

          case "曹酒令": {
            const ones = countOf(1);
            return ones ? gameOutcome("出现 " + ones + " 枚1点，需要买酒 " + ones + " 杯。", "penalty") : gameOutcome("没有1点，本轮免饮。", "win");
          }

          case "锦团国令": {
            if (sorted.join("-") === "4-5-6") return gameOutcome("四五六齐聚，合席巨饮，本令结束。", "win");
            if (uniqueCount === 2) return gameOutcome("出现对子加单数，按令重摇；若按对子采，也可合席同饮。", "");
            if (rolls.includes(1)) return gameOutcome("出现1点，摇骰者自饮1杯。", "penalty");
            if (countOf(5) > countOf(6) && countOf(5) > 0) return gameOutcome("5点最多，右座饮。", "");
            if (countOf(6) > countOf(5) && countOf(6) > 0) return gameOutcome("6点最多，对座饮。", "");
            return gameOutcome("本轮没有特殊采目，传骰继续。", "");
          }

          case "赶羊令":
            if (gameState.target === null) {
              gameState.target = total;
              return gameOutcome("令官定下羊数 " + total + "，下一位开始比大小。", "win");
            }
            if (total < gameState.target) return gameOutcome("合计 " + total + "，比羊数少 " + (gameState.target - total) + " 点，饮 " + (gameState.target - total) + " 杯。", "penalty");
            if (total > gameState.target) {
              const oldTarget = gameState.target;
              gameState.target = total;
              return gameOutcome("合计 " + total + "，胜过羊数 " + oldTarget + "，成为新的领骰者。", "win");
            }
            return gameOutcome("合计正好 " + total + "，与羊数相同，本轮和局。", "");

          case "三色令": {
            const colors = rolls.map(function (value) { return value <= 2 ? "红" : value <= 4 ? "青" : "白"; });
            const colorCount = new Set(colors).size;
            if (colorCount === 1) return gameOutcome(colors.join("、") + "，同色正采，本轮免饮。", "win");
            if (colorCount === 2) return gameOutcome(colors.join("、") + "，两色本采，本轮免饮。", "win");
            return gameOutcome(colors.join("、") + "，三色杂采，摇骰者饮1杯。", "penalty");
          }

          case "连中三元令": {
            const ones = countOf(1);
            if (ones === 3) return gameOutcome("三个1点，连中三元；席间应试者同饮。", "win");
            if (ones > 0) return gameOutcome("出现 " + ones + " 个“元”，摇骰者自饮1杯。", "penalty");
            return gameOutcome("没有1点，摇骰者自饮2杯。", "penalty");
          }

          case "并头运令":
            return uniqueCount < rolls.length ? gameOutcome("出现相同点数，“并头”成采；新婚夫妻同饮，无新婚者则摇骰者自饮。", "win") : gameOutcome("三点各异，未成并头，传骰继续。", "");

          case "陈氏觞政图令": {
            const virtue = countOf(4);
            const merit = countOf(5);
            const talent = countOf(6);
            const rank = virtue + merit + talent;
            if (rank >= 2) return gameOutcome("德 " + virtue + "、功 " + merit + "、才 " + talent + "，采目丰厚，判作升官，全席贺饮。", "win");
            if (rank === 1) return gameOutcome("德功才仅得一项，官阶平移，按席间谱面判定。", "");
            return gameOutcome("德、功、才皆未出现，判作降等，摇骰者罚饮。", "penalty");
          }

          case "朱窝令（除红谱）": {
            const redDice = rolls.filter(function (value) { return value === 1 || value === 4; }).length;
            if (redDice !== 1) return gameOutcome("红色骰面共 " + redDice + " 枚，不合“恰好一红”，请重摇。", "penalty");
            return gameOutcome("恰好一红，合计 " + total + " 点，进入除红谱的组合判罚。", "win");
          }

          case "事事如意令": {
            const fours = countOf(4);
            const before = Math.floor(gameState.fourCount / 4);
            gameState.fourCount += fours;
            const after = Math.floor(gameState.fourCount / 4);
            let message = "本轮出现 " + fours + " 个4点，累计 " + gameState.fourCount + " 个如意点。";
            if (total === 16) message += " 四骰合计16点，四四如意，全席同饮。";
            if (after > before) message += " 新凑齐一组四点，摇骰者饮 " + (after - before) + " 杯。";
            if (gameState.fourCount >= 16) message += " 已满16个四点，饮双杯并令止。";
            return gameOutcome(message, total === 16 || gameState.fourCount >= 16 ? "win" : fours ? "" : "penalty");
          }

          case "公领孙令": {
            if (rolls.includes(6)) gameState.hasGrand = true;
            const sons = countOf(1);
            if (!gameState.hasGrand) return gameOutcome("未见6点“公”，摇骰者罚饮1杯。", "penalty");
            if (!sons) return gameOutcome("已见“公”但没有1点“孙”，摇骰者罚饮1杯。", "penalty");
            return gameOutcome("公领 " + sons + " 孙，对应 " + sons + " 人饮1杯" + (sons >= 3 ? "，孙数不少于3，改饮双杯。" : "。"), "win");
          }

          case "长命富贵令": {
            const present = [4, 5, 6].filter(function (value) { return rolls.includes(value); });
            if (present.length === 3) return gameOutcome("贵、富、长命三采俱全，合席同饮。", "win");
            if (present.length === 2) return gameOutcome("已得 " + present.join("、") + "，尚缺一采，可按重复点数凑补并送罚饮给上家。", "");
            return gameOutcome("关键采目不足，无法凑补时由摇骰者自饮1杯。", "penalty");
          }

          case "一路功名到白头令": {
            let advanced = 0;
            let mistakes = 0;
            rolls.forEach(function (value) {
              if (value === gameState.next) {
                gameState.next += 1;
                advanced += 1;
              } else {
                mistakes += 1;
              }
            });
            if (gameState.next > 6) return gameOutcome("已按顺序凑齐1至6，功成名就，本令结束。", "win");
            return gameOutcome("本轮顺进 " + advanced + " 步，误点 " + mistakes + " 次；下一目标为 " + gameState.next + " 点。", mistakes ? "penalty" : "");
          }

          case "考试令（喜报登科）":
            if (total === 21) return gameOutcome("六骰合计21点，拼点成功，可对照牙牌中式采报喜登科。", "win");
            return gameOutcome("六骰合计 " + total + " 点，距离21点相差 " + Math.abs(21 - total) + " 点。", total < 21 ? "" : "penalty");

          case "乌龙令（十二红）": {
            const red = rolls.reduce(function (value, item) {
              return value + (item === 1 ? 1 : item === 4 ? 4 : 0);
            }, 0);
            if (red === 0) return gameOutcome("本轮全黑无红，为“乌龙”；不得再摇并需陪饮。", "penalty");
            gameState.redTotal += red;
            return gameOutcome(gameState.redTotal >= 12 ? "累计红点达到 " + gameState.redTotal + "，十二红已成，本令结束。" : "本轮得到 " + red + " 个红点，累计 " + gameState.redTotal + " / 12。", gameState.redTotal >= 12 ? "win" : "");
          }

          case "子孝双亲令":
            if (total === 26) return gameOutcome("合计26点，子孝双亲，合席同饮。", "win");
            if (total > 26) return gameOutcome("合计 " + total + " 点，上首1人饮。", "");
            return gameOutcome("合计 " + total + " 点，下首1人饮" + (total < 24 ? "；因低于24点，摇骰者另自饮1杯。" : "。"), total < 24 ? "penalty" : "");

          default:
            return gameOutcome("本轮合计 " + total + " 点，请按右侧核心规则行令。", "");
        }
      }

      function gameOutcome(message, tone, soundKey) {
        return {
          message: message,
          tone: tone || "",
          soundKey: soundKey || makeOutcomeSoundKey(gameRuleName, message, tone)
        };
      }

      function makeOutcomeSoundKey(ruleName, message, tone) {
        const normalized = String(message || "").replace(/\d+/g, "#");
        return [ruleName || "酒令", tone || "neutral", normalized].join("|");
      }

      function diceGlyph(value) {
        return ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"][value] || String(value);
      }

      function nodePassesFilters(node) {
        if (!filtersActive()) return true;
        const carrier = node.level === "L3" ? node : nearestLevel(node, "L3");
        if (carrier) return directFilterMatch(carrier);
        return hasMatchingDescendant(node);
      }

      function directFilterMatch(node) {
        if (filterState.diceCount) {
          const count = Number(node.diceCount || 0);
          if (filterState.diceCount === "4" ? count < 4 : count !== Number(filterState.diceCount)) return false;
        }
        if (filterState.dimension && node.cultureGroup !== filterState.dimension) return false;
        if (filterState.difficulty && node.difficulty !== filterState.difficulty) return false;
        if (filterState.mechanism && node.mechanism !== filterState.mechanism) return false;
        return true;
      }

      function hasMatchingDescendant(node) {
        if (node.level === "L3" && directFilterMatch(node)) return true;
        return (node.children || []).some(hasMatchingDescendant);
      }

      function filtersActive() {
        return Boolean(filterState.diceCount || filterState.dimension || filterState.difficulty || filterState.mechanism);
      }

      function nearestLevel(node, level) {
        let current = node;
        while (current) {
          if (current.level === level) return current;
          current = parentById.get(current.id);
        }
        return null;
      }

      function makeHint() {
        if (selected.children && selected.children.length) {
          return expanded.has(selected.id) ? "继续单击外圈，双击当前节点收回" : "单击展开，双击收回";
        }
        if (selected.level === "L4") return "同类节点已高亮";
        return "滚轮缩放，拖动画布";
      }

      function fitToVisible() {
        fitToNodes(visibleNodes);
      }

      function fitToFilterMatches() {
        const matches = filtersActive()
          ? visibleNodes.filter(function (node) { return nodePassesFilters(node); })
          : visibleNodes;
        fitToNodes(matches.length ? matches : visibleNodes);
      }

      function fitToNodes(nodes) {
        const rect = svg.getBoundingClientRect();
        if (!rect.width || !rect.height || !nodes.length) return;
        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;
        nodes.forEach(function (node) {
          const r = nodeRadius(node) + 120;
          minX = Math.min(minX, node._x - r);
          minY = Math.min(minY, node._y - r);
          maxX = Math.max(maxX, node._x + r);
          maxY = Math.max(maxY, node._y + r);
        });
        const width = Math.max(280, maxX - minX);
        const height = Math.max(280, maxY - minY);
        const k = clamp(Math.min(rect.width / width, rect.height / height), 0.42, 1.35);
        transform.k = k;
        transform.x = rect.width / 2 - ((minX + maxX) / 2) * k;
        transform.y = rect.height / 2 - ((minY + maxY) / 2) * k;
        applyTransform();
      }

      function centerOnNode(node) {
        const rect = svg.getBoundingClientRect();
        transform.x = rect.width / 2 - node._x * transform.k;
        transform.y = rect.height / 2 - node._y * transform.k;
        applyTransform();
      }

      function applyTransform() {
        viewport.setAttribute("transform", "translate(" + transform.x.toFixed(2) + " " + transform.y.toFixed(2) + ") scale(" + transform.k.toFixed(3) + ")");
        zoomLabel.textContent = "缩放 " + Math.round(transform.k * 100) + "%";
      }

      function zoomFromCenter(multiplier) {
        const rect = svg.getBoundingClientRect();
        const mx = rect.width / 2;
        const my = rect.height / 2;
        const nextK = clamp(transform.k * multiplier, 0.34, 2.8);
        const wx = (mx - transform.x) / transform.k;
        const wy = (my - transform.y) / transform.k;
        transform.x = mx - wx * nextK;
        transform.y = my - wy * nextK;
        transform.k = nextK;
        applyTransform();
      }

      function setTab(tab) {
        const showRoll = tab === "roll";
        detailTab.classList.toggle("active", !showRoll);
        rollTab.classList.toggle("active", showRoll);
        detailPane.classList.toggle("active", !showRoll);
        rollPane.classList.toggle("active", showRoll);
        if (showRoll) renderGame();
      }

      function toggleSidebar(side) {
        const isLeft = side === "left";
        const className = isLeft ? "left-collapsed" : "right-collapsed";
        const button = isLeft ? leftPanelToggle : rightPanelToggle;
        const collapsed = app.classList.toggle(className);
        button.textContent = isLeft ? (collapsed ? "›" : "‹") : (collapsed ? "‹" : "›");
        const action = collapsed ? "展开" : "收起";
        const label = action + (isLeft ? "筛选栏" : "详情栏");
        button.title = label;
        button.setAttribute("aria-label", label);
        button.setAttribute("aria-expanded", String(!collapsed));
        setTimeout(fitToVisible, 240);
      }

      function toggleMusic() {
        if (musicPlaying) {
          stopMusic();
          return;
        }
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          musicToggle.title = "当前浏览器不支持背景音乐";
          musicToggle.setAttribute("aria-label", musicToggle.title);
          return;
        }

        musicAudioContext = new AudioContextClass();
        musicMaster = musicAudioContext.createGain();
        musicDry = musicAudioContext.createGain();
        musicReverb = musicAudioContext.createConvolver();
        const wet = musicAudioContext.createGain();

        musicDry.gain.value = 0.86;
        wet.gain.value = 0.16;
        musicReverb.buffer = createMusicImpulse(musicAudioContext, 2.1);
        musicDry.connect(musicMaster);
        musicReverb.connect(wet);
        wet.connect(musicMaster);
        musicMaster.connect(musicAudioContext.destination);

        const now = musicAudioContext.currentTime;
        const target = musicVolumeGain();
        musicMaster.gain.setValueAtTime(0.0001, now);
        musicMaster.gain.exponentialRampToValueAtTime(Math.max(0.0001, target), now + 0.9);
        musicPlaying = true;
        updateMusicButton();
        if (musicAudioContext.state === "suspended") musicAudioContext.resume();
        scheduleMusicPhrase();
      }

      function stopMusic() {
        clearTimeout(musicTimer);
        musicTimer = 0;
        const context = musicAudioContext;
        const master = musicMaster;
        musicPlaying = false;
        musicAudioContext = null;
        musicMaster = null;
        musicDry = null;
        musicReverb = null;
        updateMusicButton();
        if (!context || !master) return;
        const now = context.currentTime;
        master.gain.cancelScheduledValues(now);
        master.gain.setValueAtTime(Math.max(0.0001, master.gain.value), now);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
        setTimeout(function () {
          context.close().catch(function () {});
        }, 380);
      }

      function updateMusicButton() {
        musicToggle.textContent = musicPlaying ? "Ⅱ" : "♪";
        musicToggle.setAttribute("aria-pressed", String(musicPlaying));
        musicToggle.title = musicPlaying ? "暂停背景音乐" : "播放背景音乐";
        musicToggle.setAttribute("aria-label", musicToggle.title);
      }

      function updateMusicVolume() {
        if (!musicAudioContext || !musicMaster) return;
        musicMaster.gain.setTargetAtTime(musicVolumeGain(), musicAudioContext.currentTime, 0.08);
      }

      function musicVolumeGain() {
        return Math.max(0.0001, Number(musicVolume.value || 0) / 100 * 0.21);
      }

      function scheduleMusicPhrase() {
        if (!musicPlaying || !musicAudioContext) return;
        const scale = [293.66, 329.63, 392.0, 440.0, 493.88, 587.33];
        const melody = [0, 2, 3, null, 2, 1, 0, null, 0, 1, 2, 4, 3, 2, 1, null, 0, 2, 4, 5, 4, 2, 1, null];
        const beat = 0.68;
        const start = musicAudioContext.currentTime + 0.08;
        melody.forEach(function (step, index) {
          const time = start + index * beat;
          if (step !== null) {
            playMusicPluck(scale[step], time, index % 4 === 0 ? 1.7 : 1.25, index % 4 === 0 ? 0.38 : 0.3);
          }
          if (index % 8 === 0) playMusicPluck(scale[0] / 2, time, 2.5, 0.16);
        });
        musicTimer = setTimeout(scheduleMusicPhrase, (melody.length * beat - 0.12) * 1000);
      }

      function playMusicPluck(frequency, time, duration, level) {
        if (!musicAudioContext || !musicDry || !musicReverb) return;
        const fundamental = musicAudioContext.createOscillator();
        const overtone = musicAudioContext.createOscillator();
        const overtoneGain = musicAudioContext.createGain();
        const filter = musicAudioContext.createBiquadFilter();
        const envelope = musicAudioContext.createGain();

        fundamental.type = "sine";
        fundamental.frequency.setValueAtTime(frequency, time);
        overtone.type = "triangle";
        overtone.frequency.setValueAtTime(frequency * 2.01, time);
        overtoneGain.gain.value = 0.14;
        filter.type = "lowpass";
        filter.Q.value = 1.2;
        filter.frequency.setValueAtTime(2400, time);
        filter.frequency.exponentialRampToValueAtTime(850, time + duration);
        envelope.gain.setValueAtTime(0.0001, time);
        envelope.gain.exponentialRampToValueAtTime(level, time + 0.018);
        envelope.gain.exponentialRampToValueAtTime(0.0001, time + duration);

        fundamental.connect(filter);
        overtone.connect(overtoneGain);
        overtoneGain.connect(filter);
        filter.connect(envelope);
        envelope.connect(musicDry);
        envelope.connect(musicReverb);
        fundamental.start(time);
        overtone.start(time);
        fundamental.stop(time + duration + 0.04);
        overtone.stop(time + duration + 0.04);
      }

      function createMusicImpulse(context, seconds) {
        const length = Math.floor(context.sampleRate * seconds);
        const impulse = context.createBuffer(2, length, context.sampleRate);
        for (let channel = 0; channel < impulse.numberOfChannels; channel += 1) {
          const data = impulse.getChannelData(channel);
          for (let index = 0; index < length; index += 1) {
            const decay = Math.pow(1 - index / length, 2.8);
            data[index] = (Math.random() * 2 - 1) * decay;
          }
        }
        return impulse;
      }

      function playDiceRollSound() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        let context = musicPlaying && musicAudioContext ? musicAudioContext : diceAudioContext;
        if (!context || context.state === "closed") {
          context = new AudioContextClass();
          diceAudioContext = context;
        }
        if (context.state === "suspended") context.resume();

        const output = context.createGain();
        const limiter = context.createDynamicsCompressor();
        const start = context.currentTime + 0.015;
        output.gain.setValueAtTime(1.35, start);
        limiter.threshold.value = -16;
        limiter.knee.value = 10;
        limiter.ratio.value = 5;
        limiter.attack.value = 0.003;
        limiter.release.value = 0.16;
        output.connect(limiter);
        limiter.connect(context.destination);
        [0, 0.045, 0.096, 0.154, 0.224, 0.306, 0.402, 0.51].forEach(function (offset, index) {
          scheduleDiceClick(context, output, start + offset, 0.19 - index * 0.009);
        });
        scheduleDiceLanding(context, output, start + 0.61);
        setTimeout(function () {
          try { output.disconnect(); } catch (error) {}
          try { limiter.disconnect(); } catch (error) {}
        }, 1250);
      }

      function scheduleDiceClick(context, output, time, level) {
        const duration = 0.036 + Math.random() * 0.024;
        const frameCount = Math.max(1, Math.floor(context.sampleRate * duration));
        const buffer = context.createBuffer(1, frameCount, context.sampleRate);
        const samples = buffer.getChannelData(0);
        for (let index = 0; index < frameCount; index += 1) {
          samples[index] = (Math.random() * 2 - 1) * Math.pow(1 - index / frameCount, 3.2);
        }
        const source = context.createBufferSource();
        const filter = context.createBiquadFilter();
        const gain = context.createGain();
        source.buffer = buffer;
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(620 + Math.random() * 760, time);
        filter.Q.value = 1.4 + Math.random() * 1.8;
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.001, level), time + 0.003);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(output);
        source.start(time);
        source.stop(time + duration + 0.01);
      }

      function scheduleDiceLanding(context, output, time) {
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(155, time);
        oscillator.frequency.exponentialRampToValueAtTime(82, time + 0.13);
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(0.22, time + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.16);
        oscillator.connect(gain);
        gain.connect(output);
        oscillator.start(time);
        oscillator.stop(time + 0.18);
      }

      function playGameOutcomeSound(outcome) {
        if (!outcome || isRoundEnding(outcome.message)) return;

        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        let context = musicPlaying && musicAudioContext ? musicAudioContext : diceAudioContext;
        if (!context || context.state === "closed") {
          context = new AudioContextClass();
          diceAudioContext = context;
        }
        if (context.state === "suspended") context.resume();

        const output = context.createGain();
        const limiter = context.createDynamicsCompressor();
        const start = context.currentTime + 0.78;
        const motif = outcomeSoundMotif(outcome);
        output.gain.value = motif.gain;
        limiter.threshold.value = -14;
        limiter.knee.value = 9;
        limiter.ratio.value = 4;
        limiter.attack.value = 0.004;
        limiter.release.value = 0.2;
        output.connect(limiter);
        limiter.connect(context.destination);

        motif.notes.forEach(function (frequency, index) {
          scheduleOutcomeBell(context, output, frequency, start + index * motif.spacing, motif.duration);
        });
        setTimeout(function () {
          try { output.disconnect(); } catch (error) {}
          try { limiter.disconnect(); } catch (error) {}
        }, 2400);
      }

      function outcomeSoundMotif(outcome) {
        const key = String(outcome.soundKey || "");
        if (key === "fulu-fu") return { notes: [523.25, 659.25, 783.99], spacing: 0.14, duration: 0.56, gain: 0.56 };
        if (key === "fulu-shou") return { notes: [392.0, 349.23, 293.66], spacing: 0.24, duration: 0.72, gain: 0.48 };
        if (key === "fulu-lu") return { notes: [493.88, 659.25, 493.88, 783.99], spacing: 0.1, duration: 0.42, gain: 0.52 };
        if (key === "fulu-pass") return { notes: [220.0, 196.0], spacing: 0.18, duration: 0.34, gain: 0.34 };
        if (outcome.tone === "win") return { notes: [440.0, 554.37, 659.25], spacing: 0.14, duration: 0.5, gain: 0.5 };

        const scale = [196.0, 220.0, 246.94, 293.66, 329.63, 392.0, 440.0, 493.88];
        const hash = hashOutcomeKey(key);
        const count = 2 + hash % 3;
        const notes = [];
        for (let index = 0; index < count; index += 1) {
          let scaleIndex = (hash >>> (index * 5)) % scale.length;
          if (outcome.tone === "penalty") scaleIndex = scale.length - 1 - scaleIndex;
          notes.push(scale[scaleIndex]);
        }
        return {
          notes: notes,
          spacing: 0.11 + ((hash >>> 9) % 5) * 0.025,
          duration: 0.32 + ((hash >>> 14) % 4) * 0.08,
          gain: outcome.tone === "penalty" ? 0.4 : 0.34
        };
      }

      function hashOutcomeKey(value) {
        let hash = 2166136261;
        for (let index = 0; index < value.length; index += 1) {
          hash ^= value.charCodeAt(index);
          hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
      }

      function isRoundEnding(message) {
        return /本令结束|令止|本轮功成|完成六顺|功成名就|已成，本令结束/.test(String(message || ""));
      }

      function queueRoundEndModal(ruleName) {
        clearTimeout(roundEndTimer);
        roundEndTimer = setTimeout(function () {
          roundEndTimer = 0;
          roundEndMessage.textContent = ruleName + "已完成，请重新开局或选择其他酒令。";
          roundEndModal.hidden = false;
          roundEndConfirm.focus();
        }, 900);
      }

      function closeRoundEndModal() {
        clearTimeout(roundEndTimer);
        roundEndTimer = 0;
        roundEndModal.hidden = true;
      }

      function scheduleOutcomeBell(context, output, frequency, time, duration) {
        const fundamental = context.createOscillator();
        const shimmer = context.createOscillator();
        const shimmerGain = context.createGain();
        const envelope = context.createGain();
        fundamental.type = "sine";
        shimmer.type = "triangle";
        fundamental.frequency.setValueAtTime(frequency, time);
        shimmer.frequency.setValueAtTime(frequency * 2, time);
        shimmerGain.gain.value = 0.12;
        envelope.gain.setValueAtTime(0.0001, time);
        envelope.gain.exponentialRampToValueAtTime(0.24, time + 0.012);
        envelope.gain.exponentialRampToValueAtTime(0.0001, time + duration);
        fundamental.connect(envelope);
        shimmer.connect(shimmerGain);
        shimmerGain.connect(envelope);
        envelope.connect(output);
        fundamental.start(time);
        shimmer.start(time);
        fundamental.stop(time + duration + 0.03);
        shimmer.stop(time + duration + 0.03);
      }

      function createBurst(node) {
        const count = 18;
        for (let i = 0; i < count; i += 1) {
          const angle = (Math.PI * 2 * i / count) + Math.random() * 0.18;
          const distance = 20 + Math.random() * 42;
          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("cx", node._x);
          dot.setAttribute("cy", node._y);
          dot.setAttribute("r", String(2 + Math.random() * 2));
          dot.setAttribute("fill", "#FFF1BA");
          dot.setAttribute("opacity", "0.9");
          burstLayer.appendChild(dot);
          dot.animate([
            { transform: "translate(0px, 0px)", opacity: 0.95 },
            { transform: "translate(" + Math.cos(angle) * distance + "px, " + Math.sin(angle) * distance + "px)", opacity: 0 }
          ], { duration: 680, easing: "cubic-bezier(.2,.8,.2,1)" });
          setTimeout(function () {
            dot.remove();
          }, 720);
        }
      }

      function showTooltip(node, event) {
        tooltip.textContent = tooltipText(node);
        tooltip.classList.add("show");
        moveTooltip(event);
      }

      function moveTooltip(event) {
        const pad = 14;
        const rect = tooltip.getBoundingClientRect();
        let x = event.clientX + 12;
        let y = event.clientY + 12;
        if (x + rect.width + pad > window.innerWidth) x = event.clientX - rect.width - 12;
        if (y + rect.height + pad > window.innerHeight) y = event.clientY - rect.height - 12;
        tooltip.style.left = Math.max(pad, x) + "px";
        tooltip.style.top = Math.max(pad, y) + "px";
      }

      function hideTooltip() {
        tooltip.classList.remove("show");
      }

      function tooltipText(node) {
        if (node.level === "L0") return node.name + "\n单击展开骰子数量，双击收回";
        if (node.level === "L1") return node.name + "\n" + countDescendants(node, "L3") + " 条令目\n单击展开，双击收回";
        if (node.level === "L2") return node.name + "\n" + countDescendants(node, "L3") + " 条令目\n单击展开，双击收回";
        if (node.level === "L3") {
          const details = ruleByName.get(node.name);
          return node.name + "\n" + (details ? "用骰：" + details.diceCount + "枚\n文化主题：" + details.cultureGroup : "") + "\n点击查看详情与互动玩法";
        }
        return node.name;
      }

      function countDescendants(node, level) {
        let count = 0;
        (node.children || []).forEach(function visit(child) {
          if (child.level === level) count += 1;
          (child.children || []).forEach(visit);
        });
        return count;
      }

      function nodeRadius(node) {
        const size = node.visual && node.visual.nodeSize ? Number(node.visual.nodeSize) : 20;
        return Math.max(6, Math.min(25, size / 2));
      }

      function nodeColor(node) {
        if (node.visual && node.visual.nodeColor) return node.visual.nodeColor;
        const palette = (appData.uiDesign || {}).nodePalette || {};
        if (node.level === "L0") return palette.L0 || "#FFE7A8";
        if (node.level === "L1") return palette.L1 || "#FFD6A5";
        if (node.level === "L3") return palette.L3 || "#F8C7D8";
        if (node.type === "维度") return palette.L4_dimension || "#E6F4D7";
        if (node.type === "难度") return palette.L4_difficulty || "#FDE2C5";
        if (node.type === "玩法") return palette.L4_play || "#E7E0FA";
        if (node.type === "关键词") return palette.L4_keywords || "#F7E9A6";
        if ((node.name || "").includes("点数和")) return palette.L2_sum || "#BFE3D0";
        if ((node.name || "").includes("组合")) return palette.L2_combo || "#C9D8FF";
        return palette.L2_single || "#F7C9D4";
      }

      function labelSize(node) {
        if (node.level === "L0") return 20;
        if (node.level === "L1") return 16;
        if (node.level === "L2") return 13;
        if (node.level === "L3") return 12;
        return 10.5;
      }

      function displayName(node) {
        const max = node.level === "L4" ? 14 : node.level === "L3" ? 10 : 12;
        return truncate((node.name || "").replace(/^玩法：/, ""), max);
      }

      function truncate(value, max) {
        value = String(value || "");
        return value.length > max ? value.slice(0, max - 1) + "…" : value;
      }

      function polar(angle, radius) {
        return { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius };
      }

      function searchableText(node) {
        const details = ruleByName.get(node.name);
        return [
          node.name,
          node.type,
          node.summary,
          node.dimension,
          node.difficulty,
          node.mechanism,
          node.play,
          valueText(node.keywords),
          valueText(node.value),
          details && details.diceRequirement,
          details && details.tools,
          details && details.coreRule,
          details && details.cultureGroup
        ].filter(Boolean).join(" ");
      }

      function unique(values) {
        return Array.from(new Set(values.filter(Boolean))).sort(function (a, b) {
          return String(a).localeCompare(String(b), "zh-CN");
        });
      }

      function valueText(value) {
        if (Array.isArray(value)) return value.join("、");
        if (value && typeof value === "object") return JSON.stringify(value);
        return value === undefined || value === null ? "" : String(value);
      }

      function normalValue(value) {
        if (Array.isArray(value)) return value.map(String);
        return [String(value || "")];
      }

      function valuesOverlap(a, b) {
        const left = normalValue(a);
        const right = normalValue(b);
        return left.some(function (x) {
          return right.some(function (y) {
            return x === y || x.includes(y) || y.includes(x);
          });
        });
      }

      function colorToRgba(hex, alpha) {
        const clean = String(hex).replace("#", "");
        const r = parseInt(clean.slice(0, 2), 16);
        const g = parseInt(clean.slice(2, 4), 16);
        const b = parseInt(clean.slice(4, 6), 16);
        return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
      }

      function endDrag(event) {
        if (!dragState || dragState.id !== event.pointerId) return;
        dragState = null;
        svg.classList.remove("dragging");
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function esc(value) {
        return String(value === undefined || value === null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function cssEscape(value) {
        if (window.CSS && CSS.escape) return CSS.escape(value);
        return String(value).replace(/"/g, "\\\"");
      }
    })();
  </script>
</body>
